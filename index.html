<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Хранилище Damir</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none;
    }
    body {
      font-family: 'Segoe UI', 'Roboto', system-ui, sans-serif;
      min-height: 100vh;
      background: #090c16;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 16px;
      margin: 0;
      transition: background 0.4s;
    }
    /* ----- ОБОЛОЧКА СЕЙФА ----- */
    .safe {
      max-width: 520px;
      width: 100%;
      background: radial-gradient(circle at 20% 30%, #1f2942, #0b101f 90%);
      border: 3px solid #3f4e75;
      border-radius: 48px 48px 32px 32px;
      padding: 30px 22px 28px;
      box-shadow: 
        0 30px 70px rgba(0,0,0,0.9),
        inset 0 0 60px rgba(60, 120, 255, 0.08),
        0 0 0 2px #26334d inset;
      position: relative;
      transition: box-shadow 0.3s, background 0.5s;
    }
    /* Ручка сейфа (декор) */
    .safe-handle {
      position: absolute;
      right: 24px;
      top: 30px;
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: radial-gradient(circle at 40% 35%, #7a8bb0, #2d3b5a);
      border: 2px solid #53658b;
      box-shadow: 0 0 0 4px #141c30, 0 8px 0 #0f1425;
      transform: rotate(-8deg);
      opacity: 0.5;
    }
    .safe-handle::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 14px;
      height: 14px;
      background: #1f2a44;
      border-radius: 50%;
      transform: translate(-50%, -50%);
      border: 2px solid #44557c;
    }
    /* ----- ЭКРАН СЕЙФА (дисплей) ----- */
    .display {
      background: #0b111f;
      border: 2px solid #3e5280;
      border-radius: 20px;
      padding: 18px 16px 14px;
      margin-bottom: 18px;
      box-shadow: inset 0 0 30px rgba(0, 10, 40, 0.8), 0 0 20px rgba(30, 80, 200, 0.15);
      position: relative;
      min-height: 110px;
      transition: 0.3s;
    }
    .display .level-tag {
      color: #8aa3d4;
      font-size: 0.7rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      opacity: 0.7;
      border-bottom: 1px solid #25355a;
      padding-bottom: 6px;
      margin-bottom: 8px;
    }
    .display .question-text {
      color: #e8f0ff;
      font-size: 1.4rem;
      font-weight: 400;
      line-height: 1.5;
      min-height: 72px;
      text-shadow: 0 0 12px rgba(70, 150, 255, 0.15);
      word-break: break-word;
    }
    /* ----- КОДОВЫЙ ВВОД ----- */
    .code-input-area {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin: 14px 0 6px;
    }
    .code-input-area input {
      background: #0c1428;
      border: 2px solid #314772;
      border-radius: 60px;
      padding: 16px 20px;
      color: #d6e8ff;
      font-size: 1.1rem;
      text-align: center;
      letter-spacing: 2px;
      outline: none;
      transition: 0.2s;
      box-shadow: inset 0 4px 12px rgba(0,0,0,0.6);
    }
    .code-input-area input:focus {
      border-color: #7aafff;
      box-shadow: 0 0 30px rgba(60, 160, 255, 0.2), inset 0 4px 12px rgba(0,0,0,0.6);
    }
    .btn-group {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }
    .btn-group button {
      flex: 1;
      padding: 14px 8px;
      border: none;
      border-radius: 60px;
      font-weight: 700;
      font-size: 0.95rem;
      letter-spacing: 1px;
      cursor: pointer;
      transition: 0.15s;
      background: #2b4270;
      color: #ecf3ff;
      box-shadow: 0 6px 0 #15233f;
      transform: translateY(0);
      text-shadow: 0 1px 0 rgba(255,255,255,0.05);
    }
    .btn-group button:active {
      transform: translateY(4px);
      box-shadow: 0 2px 0 #15233f;
    }
    .btn-group .btn-hint {
      background: #3d3f6b;
      box-shadow: 0 6px 0 #23264a;
    }
    .btn-group .btn-hint:disabled {
      opacity: 0.35;
      transform: translateY(4px);
      box-shadow: 0 2px 0 #23264a;
      pointer-events: none;
    }
    /* ----- СООБЩЕНИЯ (обратная связь) ----- */
    .feedback {
      margin-top: 18px;
      padding: 14px 18px;
      border-radius: 20px;
      background: rgba(10, 18, 40, 0.6);
      border-left: 4px solid #3e67b0;
      color: #b2caf5;
      font-size: 0.95rem;
      min-height: 48px;
      backdrop-filter: blur(2px);
      transition: 0.25s;
    }
    .feedback.success {
      border-left-color: #4cdb7b;
      color: #b2f0c8;
    }
    .feedback.error {
      border-left-color: #ff5e6b;
      color: #f5b8b8;
      animation: shake 0.3s;
    }
    @keyframes shake {
      0% { transform: translateX(0); }
      25% { transform: translateX(-8px); }
      50% { transform: translateX(8px); }
      75% { transform: translateX(-4px); }
      100% { transform: translateX(0); }
    }
    /* ----- ПОДСКАЗКА (записка) ----- */
    .hint-box {
      margin-top: 12px;
      padding: 14px 18px;
      background: #161f3b;
      border: 1px dashed #4f6a9b;
      border-radius: 20px;
      color: #b0caff;
      font-size: 0.9rem;
      display: none;
      transition: 0.3s;
    }
    .hint-box.visible {
      display: block;
      animation: fadeUp 0.4s ease;
    }
    @keyframes fadeUp {
      0% { opacity: 0; transform: translateY(12px); }
      100% { opacity: 1; transform: translateY(0); }
    }
    /* ----- ПРОГРЕСС (глубиномер) ----- */
    .depth-track {
      margin: 18px 0 8px;
      height: 6px;
      background: #1b2644;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: inset 0 2px 6px rgba(0,0,0,0.5);
    }
    .depth-fill {
      height: 100%;
      width: 8%;
      background: linear-gradient(90deg, #3f8eff, #7fbcff);
      border-radius: 10px;
      transition: width 0.7s ease;
      box-shadow: 0 0 20px #3f8eff66;
    }
    .depth-label {
      display: flex;
      justify-content: space-between;
      color: #4e6592;
      font-size: 0.55rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-top: 4px;
    }
    /* ----- ФИНАЛЬНЫЙ ЭКРАН ----- */
    .final-screen {
      text-align: center;
      padding: 20px 0;
      color: #ddeaff;
    }
    .final-screen h2 {
      font-size: 2rem;
      font-weight: 300;
      letter-spacing: 4px;
      margin-bottom: 12px;
      text-shadow: 0 0 40px #3f8eff55;
    }
    .final-screen .emoji-big {
      font-size: 4rem;
      display: block;
      margin-bottom: 10px;
    }
    /* ----- АДАПТИВ ----- */
    @media (max-width: 480px) {
      .safe { padding: 20px 14px; }
      .display .question-text { font-size: 1.1rem; min-height: 60px; }
      .btn-group button { font-size: 0.8rem; padding: 12px 6px; }
    }
  </style>
</head>
<body>

<div class="safe" id="app">
  <!-- Декоративная ручка -->
  <div class="safe-handle"></div>

  <!-- Дисплей -->
  <div class="display" id="display">
    <div class="level-tag" id="levelTag">УРОВЕНЬ 1 / 6</div>
    <div class="question-text" id="questionText">🔐 Введите код...</div>
  </div>

  <!-- Ввод кода -->
  <div class="code-input-area" id="inputArea">
    <input type="text" id="codeInput" placeholder="Введите код" autocomplete="off">
    <div class="btn-group">
      <button id="checkBtn">🔓 Открыть</button>
      <button id="hintBtn" class="btn-hint">📜 Записка</button>
    </div>
  </div>

  <!-- Обратная связь -->
  <div class="feedback" id="feedback">💬 Введите код и нажмите «Открыть».</div>

  <!-- Блок подсказки -->
  <div class="hint-box" id="hintBox">📜 Здесь будет подсказка.</div>

  <!-- Прогресс погружения -->
  <div class="depth-track">
    <div class="depth-fill" id="depthFill" style="width: 8%;"></div>
  </div>
  <div class="depth-label">
    <span>Поверхность</span>
    <span id="depthPercent">8%</span>
    <span>Бездна</span>
  </div>
</div>

<script>
  // ========================
  //  ДАННЫЕ ИГРЫ (6 уровней)
  // ========================
  const LEVELS = [
    {
      question: 'Мой любимый сериал?',
      code: ['бумажный дом', 'бумажныйдом', 'ла каса де папель', 'la casa de papel', 'бумажный', 'дом'],
      hint: 'Испанский сериал про ограбление',
      hintQuestion: 'В какой стране снят сериал?',
      hintAnswer: ['испания', 'испании', 'испан']
    },
    {
      question: 'Мой главный провал — 6 лет в… (что?)',
      code: ['подушку', 'в подушку', 'подушка', 'в подушке', 'подушкой', '6 лет в подушку', '6 лет подушка'],
      hint: 'Связано с СоЕй (одна буква "Е")',
      hintQuestion: 'Кто такая СоЕя?',
      hintAnswer: ['параллель', 'с параллели', 'девочка с параллели', 'соя', 'соея']
    },
    {
      question: 'Как звали мою любимую собаку?',
      code: ['шерхан', 'шер хан', 'sherkhan', 'шерхан'],
      hint: 'Имя из "Книги джунглей"',
      hintQuestion: 'Какой персонаж Маугли был тигром?',
      hintAnswer: ['тигр', 'шерхан', 'тигр шерхан']
    },
    {
      question: 'Самый тёплый класс в школе?',
      code: ['7', 'седьмой', '7 класс', '7-й', 'седьмой класс'],
      hint: 'Переходный возраст',
      hintQuestion: 'В каком классе обычно 13–14 лет?',
      hintAnswer: ['7', 'седьмой', '7 класс']
    },
    {
      question: 'Что я всегда ношу в кармане (кроме телефона и ключей)?',
      code: ['монетка', 'монета', 'монету', 'монетку', 'рубль', 'копейка', 'мелочь'],
      hint: 'Металлический кругляш',
      hintQuestion: 'Что звенит в кармане?',
      hintAnswer: ['монета', 'монетка', 'рубль']
    },
    {
      question: 'Какая суперсила мне нравится (бесполезная для других)?',
      code: ['невидимость', 'невидимка', 'стать невидимым', 'невидимый', 'невидимость'],
      hint: 'Никто тебя не видит',
      hintQuestion: 'Что делают, чтобы исчезнуть?',
      hintAnswer: ['невидимый', 'невидимость', 'стать невидимым']
    }
  ];

  // ========================
  //  СОСТОЯНИЕ ИГРЫ
  // ========================
  let currentLevel = 0;
  let hintUsed = false;
  let hintUnlocked = false;
  let isFinal = false;

  // DOM-элементы
  const questionEl = document.getElementById('questionText');
  const levelTag = document.getElementById('levelTag');
  const codeInput = document.getElementById('codeInput');
  const checkBtn = document.getElementById('checkBtn');
  const hintBtn = document.getElementById('hintBtn');
  const feedback = document.getElementById('feedback');
  const hintBox = document.getElementById('hintBox');
  const depthFill = document.getElementById('depthFill');
  const depthPercent = document.getElementById('depthPercent');
  const inputArea = document.getElementById('inputArea');

  // ========================
  //  ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ
  // ========================
  function normalize(str) {
    return str.trim().toLowerCase().replace(/\s+/g, ' ');
  }

  function matchCode(input, codeArray) {
    const clean = normalize(input);
    return codeArray.some(c => {
      const cClean = normalize(c);
      return clean === cClean || clean.includes(cClean) || cClean.includes(clean);
    });
  }

  function matchHint(input, answerArray) {
    const clean = normalize(input);
    return answerArray.some(a => {
      const aClean = normalize(a);
      return clean === aClean || clean.includes(aClean) || aClean.includes(clean);
    });
  }

  // ========================
  //  ОБНОВЛЕНИЕ ИНТЕРФЕЙСА
  // ========================
  function updateDepth(level) {
    const percent = Math.min(10 + level * 14, 92);
    depthFill.style.width = percent + '%';
    depthPercent.textContent = percent + '%';
  }

  function loadLevel(index) {
    if (index >= LEVELS.length) {
      // === ФИНАЛ ===
      isFinal = true;
      document.querySelector('.safe').style.background = 'radial-gradient(circle at 30% 40%, #1a2a5a, #070d1f 100%)';
      questionEl.innerHTML = '<span style="font-size:2.8rem;">💎</span><br>Ты открыл Хранилище!';
      levelTag.textContent = '🏆 ЗАВЕРШЕНО';
      inputArea.style.display = 'none';
      feedback.innerHTML = '🔥 Ты знаешь меня глубже всех. Спасибо за игру!';
      feedback.className = 'feedback success';
      hintBox.classList.remove('visible');
      updateDepth(10);
      return;
    }

    const lv = LEVELS[index];
    questionEl.textContent = lv.question;
    levelTag.textContent = `УРОВЕНЬ ${index+1} / ${LEVELS.length}`;
    codeInput.value = '';
    feedback.innerHTML = '🔐 Введите код и нажмите «Открыть».';
    feedback.className = 'feedback';
    hintBox.classList.remove('visible');
    hintUsed = false;
    hintUnlocked = false;
    hintBtn.disabled = false;
    inputArea.style.display = 'flex';
    isFinal = false;
    updateDepth(index);
    // сброс стиля сейфа
    document.querySelector('.safe').style.background = '';
  }

  // ========================
  //  ОБРАБОТЧИКИ
  // ========================

  // Проверка кода
  checkBtn.addEventListener('click', function() {
    if (isFinal) return;
    const lv = LEVELS[currentLevel];
    if (!lv) return;

    const raw = codeInput.value.trim();
    if (!raw) {
      feedback.innerHTML = '❌ Введите код!';
      feedback.className = 'feedback error';
      return;
    }

    if (matchCode(raw, lv.code)) {
      feedback.innerHTML = '✅ Замок открыт! Погружаемся глубже...';
      feedback.className = 'feedback success';
      currentLevel++;
      setTimeout(() => loadLevel(currentLevel), 800);
    } else {
      feedback.innerHTML = '❌ Неверный код. Попробуйте ещё или используйте записку.';
      feedback.className = 'feedback error';
      // вибрация при ошибке (лёгкая)
      document.querySelector('.safe').style.transform = 'translateX(-4px)';
      setTimeout(() => document.querySelector('.safe').style.transform = '', 100);
    }
  });

  // Подсказка (записка)
  hintBtn.addEventListener('click', function() {
    if (isFinal) return;
    const lv = LEVELS[currentLevel];
    if (!lv) return;

    if (hintUsed) {
      feedback.innerHTML = '⛔ Вы уже использовали записку на этом уровне.';
      feedback.className = 'feedback error';
      return;
    }

    if (!hintUnlocked) {
      // Запрашиваем доп. вопрос
      const userAnswer = prompt('📜 Чтобы получить записку, ответьте:\n' + lv.hintQuestion);
      if (userAnswer === null) {
        feedback.innerHTML = '❌ Без ответа записка не выдаётся.';
        feedback.className = 'feedback error';
        return;
      }
      if (!matchHint(userAnswer, lv.hintAnswer)) {
        feedback.innerHTML = '❌ Неверный ответ. Записка не дана.';
        feedback.className = 'feedback error';
        return;
      }
      // Правильный ответ на доп. вопрос
      hintUnlocked = true;
      feedback.innerHTML = '✅ Ответ верный! Теперь нажмите "Записка" ещё раз.';
      feedback.className = 'feedback success';
      return;
    }

    // Показываем подсказку
    hintBox.textContent = '📜 ' + lv.hint;
    hintBox.classList.add('visible');
    hintUsed = true;
    hintBtn.disabled = true;
    feedback.innerHTML = '💡 Подсказка появилась выше.';
    feedback.className = 'feedback';
  });

  // Enter на клавиатуре
  codeInput.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') checkBtn.click();
  });

  // ========================
  //  СТАРТ
  // ========================
  loadLevel(0);
</script>
</body>
</html>
