<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Айсберг | Тайны Damir</title>
    <style>
        /* ===== ГЛОБАЛЬНЫЙ СТИЛЬ ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', 'Roboto', sans-serif;
            min-height: 100vh;
            background: #0a0e1a;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            transition: background 0.8s ease;
            overflow-x: hidden;
        }
        /* ===== КОНТЕЙНЕР ===== */
        .container {
            position: relative;
            background: rgba(10, 14, 30, 0.65);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(90, 140, 255, 0.15);
            border-radius: 48px;
            padding: 40px 32px;
            max-width: 580px;
            width: 100%;
            box-shadow: 0 30px 80px rgba(0, 20, 60, 0.8), inset 0 0 80px rgba(30, 80, 180, 0.1);
            transition: all 0.6s ease;
            overflow: hidden;
        }
        /* ===== АНИМАЦИЯ ЧАСТИЦ (снег/льдинки) ===== */
        .particles {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
            z-index: 0;
        }
        .particle {
            position: absolute;
            background: rgba(180, 220, 255, 0.25);
            border-radius: 50%;
            animation: floatParticle 12s infinite ease-in-out;
        }
        @keyframes floatParticle {
            0% { transform: translateY(0) scale(1); opacity: 0.6; }
            50% { transform: translateY(-60px) scale(1.8); opacity: 0.2; }
            100% { transform: translateY(0) scale(1); opacity: 0.6; }
        }
        /* ===== ГЛУБИНОМЕР ===== */
        .depth-meter {
            position: absolute;
            left: 8px;
            top: 40px;
            bottom: 40px;
            width: 4px;
            background: rgba(60, 120, 255, 0.15);
            border-radius: 4px;
            z-index: 2;
        }
        .depth-fill {
            position: absolute;
            bottom: 0;
            width: 100%;
            background: linear-gradient(to top, #1a5cff, #6db3ff);
            border-radius: 4px;
            transition: height 0.8s ease;
            box-shadow: 0 0 20px #1a5cff55;
        }
        .depth-label {
            position: absolute;
            left: 18px;
            bottom: 10px;
            color: rgba(150, 200, 255, 0.3);
            font-size: 0.6rem;
            letter-spacing: 2px;
            writing-mode: vertical-lr;
            text-orientation: mixed;
            z-index: 2;
        }
        /* ===== ЗАГОЛОВОК ===== */
        .header {
            position: relative;
            z-index: 2;
            text-align: center;
            margin-bottom: 16px;
        }
        .header h1 {
            font-size: 2.2rem;
            font-weight: 300;
            letter-spacing: 6px;
            color: #e0eeff;
            text-shadow: 0 0 30px rgba(80, 160, 255, 0.3);
        }
        .header .sub {
            color: rgba(140, 180, 255, 0.5);
            font-size: 0.75rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-top: 2px;
        }
        /* ===== УРОВЕНЬ ===== */
        .level-badge {
            position: relative;
            z-index: 2;
            display: inline-block;
            background: rgba(30, 70, 150, 0.25);
            border: 1px solid rgba(80, 160, 255, 0.2);
            padding: 6px 22px;
            border-radius: 40px;
            color: #a0c8ff;
            font-size: 0.75rem;
            letter-spacing: 2px;
            backdrop-filter: blur(4px);
            margin-bottom: 18px;
        }
        /* ===== ВОПРОС ===== */
        .question {
            position: relative;
            z-index: 2;
            color: #eaf2ff;
            font-size: 1.6rem;
            font-weight: 400;
            line-height: 1.5;
            min-height: 90px;
            padding: 10px 0 20px 0;
            border-bottom: 1px dashed rgba(60, 120, 255, 0.15);
            text-shadow: 0 2px 20px rgba(0, 40, 120, 0.3);
        }
        /* ===== ВВОД ===== */
        .input-group {
            position: relative;
            z-index: 2;
            display: flex;
            flex-direction: column;
            gap: 14px;
            margin-top: 22px;
        }
        .input-group input {
            padding: 16px 20px;
            border-radius: 60px;
            border: 1px solid rgba(60, 120, 255, 0.2);
            background: rgba(0, 10, 30, 0.5);
            color: #d0e4ff;
            font-size: 1rem;
            outline: none;
            transition: 0.3s;
            text-align: center;
            letter-spacing: 0.5px;
            backdrop-filter: blur(4px);
        }
        .input-group input:focus {
            border-color: #4a8cff;
            box-shadow: 0 0 40px rgba(60, 140, 255, 0.15);
        }
        .btn-row {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }
        .btn-row button {
            flex: 1;
            padding: 14px 10px;
            border-radius: 60px;
            border: none;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.25s;
            letter-spacing: 0.5px;
            background: #1a4b8a;
            color: #fff;
            box-shadow: 0 6px 0 #0d2650;
            transform: translateY(0);
            backdrop-filter: blur(4px);
        }
        .btn-row button:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #0d2650;
        }
        .btn-hint {
            background: #2a3f6a !important;
            box-shadow: 0 6px 0 #17233d !important;
        }
        .btn-hint:disabled {
            opacity: 0.35;
            transform: translateY(4px);
            box-shadow: 0 2px 0 #17233d !important;
            pointer-events: none;
        }
        /* ===== СООБЩЕНИЯ ===== */
        .message {
            position: relative;
            z-index: 2;
            margin-top: 22px;
            padding: 16px 20px;
            border-radius: 20px;
            background: rgba(0, 20, 60, 0.25);
            border-left: 3px solid #2a6ac0;
            color: #b8d4ff;
            font-size: 0.95rem;
            min-height: 50px;
            backdrop-filter: blur(4px);
            transition: 0.3s;
        }
        .message.success {
            border-left-color: #4cdb7b;
            color: #a0f0c0;
        }
        .message.error {
            border-left-color: #ff5e6b;
            color: #f5b0b0;
        }
        /* ===== ПОДСКАЗКА (бутылка) ===== */
        .hint-block {
            position: relative;
            z-index: 2;
            margin-top: 16px;
            padding: 16px 20px;
            background: rgba(20, 50, 100, 0.2);
            border-radius: 20px;
            border: 1px dashed rgba(80, 160, 255, 0.2);
            color: #9abfff;
            font-size: 0.9rem;
            display: none;
            backdrop-filter: blur(4px);
            transition: 0.4s;
        }
        .hint-block.visible {
            display: block;
            animation: fadeHint 0.5s ease;
        }
        @keyframes fadeHint {
            0% { opacity: 0; transform: translateY(10px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        /* ===== ФУТЕР ===== */
        .footer {
            position: relative;
            z-index: 2;
            margin-top: 28px;
            text-align: center;
            color: rgba(80, 140, 255, 0.2);
            font-size: 0.6rem;
            letter-spacing: 3px;
        }
        /* ===== АДАПТИВ ===== */
        @media (max-width: 480px) {
            .container { padding: 28px 18px; }
            .header h1 { font-size: 1.6rem; }
            .question { font-size: 1.25rem; }
            .depth-meter { left: 4px; }
            .depth-label { display: none; }
        }
        /* ===== УРОВНИ ТЕМЫ ===== */
        .level-theme-0 { background: #0e1428; }
        .level-theme-1 { background: #0c1635; }
        .level-theme-2 { background: #091844; }
        .level-theme-3 { background: #061a4f; }
        .level-theme-4 { background: #031c5a; }
        .level-theme-5 { background: #001f66; }
        .container {
            transition: background 0.8s ease, box-shadow 0.8s ease;
        }
        .container.depth-0 { background: rgba(10, 14, 30, 0.65); }
        .container.depth-1 { background: rgba(6, 18, 48, 0.7); }
        .container.depth-2 { background: rgba(4, 20, 60, 0.75); }
        .container.depth-3 { background: rgba(2, 22, 72, 0.8); }
        .container.depth-4 { background: rgba(0, 24, 84, 0.85); }
        .container.depth-5 { background: rgba(0, 26, 96, 0.9); }
    </style>
</head>
<body>
    <div class="container" id="app">
        <!-- Частицы -->
        <div class="particles" id="particles"></div>
        <!-- Глубиномер -->
        <div class="depth-meter">
            <div class="depth-fill" id="depthFill" style="height: 10%;"></div>
            <div class="depth-label">ГЛУБИНА</div>
        </div>

        <!-- Шапка -->
        <div class="header">
            <h1>❄️ АЙСБЕРГ</h1>
            <div class="sub">Тайны Damir</div>
        </div>

        <div class="level-badge" id="levelDisplay">Уровень 1 / 6</div>
        <div class="question" id="questionText">Загружаю...</div>

        <div class="input-group">
            <input type="text" id="answerInput" placeholder="Введи ответ..." autocomplete="off">
            <div class="btn-row">
                <button id="checkBtn">🧊 Проверить</button>
                <button id="hintBtn" class="btn-hint">💡 Бутылка</button>
            </div>
        </div>

        <div class="message" id="messageArea">💬 Напиши ответ и нажми «Проверить».</div>
        <div class="hint-block" id="hintBlock">🔮 Здесь будет подсказка</div>
        <div class="footer">каждый шаг — глубже</div>
    </div>

    <script>
        // ========== ДАННЫЕ ИГРЫ ==========
        const levels = [
            {
                question: "Какой мой самый любимый сериал?",
                code: ["бумажный дом", "бумажныйдом", "ла каса де папель", "la casa de papel", "бумажный", "дом"],
                hint: "Испанский сериал про ограбление",
                hintQuestion: "В какой стране снят сериал?"
            },
            {
                question: "Мой главный провал — это 6 лет в... (что?)",
                code: ["подушку", "в подушку", "подушка", "в подушке", "подушкой", "6 лет в подушку", "6 лет подушка"],
                hint: "Связано с Соней (это не опечатка)",
                hintQuestion: "Кто такая Соня?"
            },
            {
                question: "Как звали мою любимую собаку?",
                code: ["шерхан", "шерхан", "шер хан", "sherkhan", "шерхан"],
                hint: "Имя из 'Книги джунглей'",
                hintQuestion: "Какой персонаж Маугли был тигром?"
            },
            {
                question: "Какой класс в школе я вспоминаю с самой большой теплотой?",
                code: ["7", "седьмой", "7 класс", "7-й", "седьмой класс"],
                hint: "Это возраст 13–14 лет",
                hintQuestion: "В каком классе обычно проходит переходный возраст?"
            },
            {
                question: "Что я всегда ношу с собой, кроме телефона и ключей?",
                code: ["монетка", "монета", "монету", "монетку", "рубль", "копейка"],
                hint: "Это металлический кругляш",
                hintQuestion: "Что звенит в кармане?"
            },
            {
                question: "Какая суперсила мне нравится? (самая бесполезная для других)",
                code: ["невидимость", "невидимка", "стать невидимым", "невидимый", "невидимость"],
                hint: "Никто тебя не видит",
                hintQuestion: "Что делают, чтобы исчезнуть?"
            }
        ];

        // ========== ЛОГИКА ==========
        let currentLevel = 0;
        let hintUsed = false;
        let hintUnlocked = false;

        const questionEl = document.getElementById('questionText');
        const levelDisplay = document.getElementById('levelDisplay');
        const answerInput = document.getElementById('answerInput');
        const checkBtn = document.getElementById('checkBtn');
        const hintBtn = document.getElementById('hintBtn');
        const messageArea = document.getElementById('messageArea');
        const hintBlock = document.getElementById('hintBlock');
        const depthFill = document.getElementById('depthFill');
        const container = document.getElementById('app');

        function updateDepth(level) {
            const percent = Math.min(10 + level * 14, 90);
            depthFill.style.height = percent + '%';
            container.className = 'container depth-' + Math.min(level, 5);
            // particles
            const p = document.getElementById('particles');
            p.innerHTML = '';
            for (let i = 0; i < 12 + level * 2; i++) {
                const d = document.createElement('div');
                d.className = 'particle';
                d.style.width = (2 + Math.random() * 6) + 'px';
                d.style.height = d.style.width;
                d.style.left = Math.random() * 100 + '%';
                d.style.top = Math.random() * 100 + '%';
                d.style.animationDelay = (Math.random() * 8) + 's';
                d.style.animationDuration = (8 + Math.random() * 10) + 's';
                d.style.opacity = 0.1 + Math.random() * 0.25;
                p.appendChild(d);
            }
        }

        function loadLevel(index) {
            const lv = levels[index];
            if (!lv) {
                questionEl.innerHTML = '🎉 Ты прошёл весь айсберг!<br>Ты знаешь меня глубже всех.';
                levelDisplay.textContent = '🏆 ПОГРУЖЕНИЕ ЗАВЕРШЕНО';
                document.querySelector('.input-group').style.display = 'none';
                messageArea.innerHTML = '💎 Ты — настоящий друг. Спасибо, что нырнул так глубоко.';
                messageArea.className = 'message success';
                hintBlock.classList.remove('visible');
                updateDepth(10);
                return;
            }
            questionEl.textContent = lv.question;
            levelDisplay.textContent = `Уровень ${index+1} / ${levels.length}`;
            answerInput.value = '';
            messageArea.innerHTML = '💬 Введи ответ и нажми «Проверить».';
            messageArea.className = 'message';
            hintBlock.classList.remove('visible');
            hintUsed = false;
            hintUnlocked = false;
            hintBtn.disabled = false;
            document.querySelector('.input-group').style.display = 'flex';
            updateDepth(index);
        }

        function showMessage(text, type = '') {
            messageArea.textContent = text;
            messageArea.className = 'message ' + type;
        }

        function showHint(text) {
            hintBlock.textContent = '🔮 ' + text;
            hintBlock.classList.add('visible');
        }

        function checkCode(userAnswer, codeArray) {
            const clean = userAnswer.trim().toLowerCase().replace(/\s+/g, ' ');
            return codeArray.some(c => clean === c.trim().toLowerCase() || clean.includes(c.trim().toLowerCase()));
        }

        checkBtn.addEventListener('click', function() {
            const lv = levels[currentLevel];
            if (!lv) return;
            const userAnswer = answerInput.value.trim();
            if (!userAnswer) {
                showMessage('❌ Напиши что-нибудь!', 'error');
                return;
            }
            if (checkCode(userAnswer, lv.code)) {
                showMessage('✅ Верно! Ты погружаешься глубже...', 'success');
                currentLevel++;
                setTimeout(() => loadLevel(currentLevel), 900);
            } else {
                showMessage('❌ Не угадал. Попробуй ещё или кинь бутылку с подсказкой.', 'error');
            }
        });

        hintBtn.addEventListener('click', function() {
            const lv = levels[currentLevel];
            if (!lv) return;
            if (hintUsed) {
                showMessage('⛔ Ты уже использовал бутылку на этом уровне.', 'error');
                return;
            }
            if (!hintUnlocked) {
                const extra = prompt('🔐 Чтобы получить бутылку с подсказкой, ответь:\n' + lv.hintQuestion);
                if (extra === null) {
                    showMessage('❌ Без ответа — бутылка не всплывёт.', 'error');
                    return;
                }
                if (extra.trim().length < 1) {
                    showMessage('❌ Слишком коротко.', 'error');
                    return;
                }
                hintUnlocked = true;
                showMessage('✅ Бутылка поднята! Нажми ещё раз.', 'success');
                return;
            }
            showHint(lv.hint);
            hintUsed = true;
            hintBtn.disabled = true;
            showMessage('💡 Подсказка внутри бутылки.', '');
        });

        answerInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') checkBtn.click();
        });

        // Старт
        loadLevel(0);
    </script>
</body>
</html>
